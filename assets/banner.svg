<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="MarcEddy — does the boring half of your job hunt">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="340" rx="28" fill="url(#bg)"/>

  <!-- decorative orbs -->
  <circle cx="1140" cy="70" r="150" fill="#7c3aed" opacity="0.18"/>
  <circle cx="1230" cy="300" r="120" fill="#22d3ee" opacity="0.12"/>
  <circle cx="60" cy="300" r="90" fill="#34d399" opacity="0.10"/>

  <!-- top accent bar -->
  <rect x="80" y="64" width="120" height="8" rx="4" fill="url(#accent)"/>

  <!-- title -->
  <text x="78" y="172" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="92" font-weight="800" fill="url(#title)" letter-spacing="-1">MarcEddy</text>

  <!-- tagline -->
  <text x="82" y="222" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#cbd5e1">Does the boring half of your job hunt.</text>

  <!-- terminal chip -->
  <rect x="82" y="252" width="540" height="48" rx="10" fill="#0b1020" stroke="#334155" stroke-width="1.5" opacity="0.92"/>
  <circle cx="104" cy="276" r="5" fill="#ef4444"/>
  <circle cx="122" cy="276" r="5" fill="#f59e0b"/>
  <circle cx="140" cy="276" r="5" fill="#22c55e"/>
  <text x="166" y="282" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="20" fill="#a7f3d0">$ marceddy scan --source us</text>

  <!-- right-side "no-submit" seal -->
  <g transform="translate(1010,150)">
    <rect x="-10" y="-34" width="210" height="68" rx="34" fill="#0b1020" stroke="url(#accent)" stroke-width="2" opacity="0.95"/>
    <text x="95" y="-4" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">DRY-RUN</text>
    <text x="95" y="20" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">never applies for you</text>
  </g>
</svg>
